# FAQs de ejemplo para onboarding de municipios
# Sustituir con las FAQs reales del ayuntamiento

- pregunta: "¿Cuál es el horario de atención al público?"
  respuesta: >
    El Ayuntamiento atiende al público de lunes a viernes de 9:00 a 14:00 horas.
    Para determinados trámites puede solicitar cita previa fuera de ese horario.
    Consulte nuestra web municipal o llame al teléfono de información para más detalles.

- pregunta: "¿Cómo puedo empadronarme en el municipio?"
  respuesta: >
    Para empadronarse en el municipio debe presentar en el Ayuntamiento:
    1. DNI o NIE en vigor del/los solicitante/s
    2. Título que acredite el uso de la vivienda (escritura de propiedad, contrato de alquiler,
       autorización del propietario o del titular del padrón)
    3. Formulario de alta en el padrón (disponible en la web municipal y en las oficinas)
    El trámite es gratuito y puede solicitarlo en persona o mediante cita previa.

- pregunta: "¿Qué documentos necesito para solicitar una licencia de obra menor?"
  respuesta: >
    Para solicitar una licencia de obra menor debe presentar:
    1. Instancia de solicitud (formulario normalizado del ayuntamiento)
    2. DNI o NIF del solicitante
    3. Descripción detallada de las obras a realizar
    4. Presupuesto de ejecución de las obras
    5. Plano de situación de la vivienda o local
    6. En su caso, fotografías del estado actual
    El plazo de resolución es de un mes desde la presentación completa de la documentación.

- pregunta: "¿Cómo solicito un vado permanente?"
  respuesta: >
    Para solicitar un vado permanente (acceso de vehículos a garajes) debe presentar:
    1. Solicitud firmada por el titular
    2. DNI/NIF del solicitante
    3. Plano de situación y croquis de la entrada
    4. Justificante del pago de la tasa correspondiente
    5. Fotografía del lugar donde se pretende instalar el vado
    La instalación requiere la señalización horizontal y vertical que marca la normativa.

- pregunta: "¿Puedo realizar trámites de forma telemática?"
  respuesta: >
    Sí, muchos trámites pueden realizarse de forma telemática a través de la Sede Electrónica
    Municipal. Para ello necesitará disponer de certificado digital o Cl@ve.
    Los trámites disponibles en sede electrónica incluyen: instancias generales, padrón,
    licencias, declaraciones responsables y solicitud de documentos.
    Acceda a través de nuestra web municipal en el apartado "Sede Electrónica".

- pregunta: "¿Cuánto cuesta el volante de empadronamiento?"
  respuesta: >
    El volante de empadronamiento es gratuito. Puede obtenerlo:
    - En persona en las oficinas del Ayuntamiento (presentando DNI)
    - Por correo electrónico solicitándolo a través de la web municipal
    - Mediante certificado digital en la Sede Electrónica
    El volante tiene validez de 3 meses desde su expedición para la mayoría de trámites.
