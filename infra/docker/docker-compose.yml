version: "3.9"

# =============================================================================
# Copiloto Administrativo — Stack local de desarrollo
# Uso: docker compose -f infra/docker/docker-compose.yml up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 con pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: copiloto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-copiloto}
      POSTGRES_USER: ${POSTGRES_USER:-copiloto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-copiloto} -d ${POSTGRES_DB:-copiloto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: copiloto-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO (almacenamiento objetos, compatible S3)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: copiloto-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_dev}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web (http://localhost:9001)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Keycloak (autenticación / SSO)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: copiloto-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme_dev}
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ../../infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"   # Admin: http://localhost:8080
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo 'ok'"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # FastAPI backend (dev con hot-reload via uvicorn)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
      target: development
    container_name: copiloto-api
    restart: unless-stopped
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-copiloto}:${POSTGRES_PASSWORD:-changeme_dev}@postgres:5432/${POSTGRES_DB:-copiloto}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      KEYCLOAK_URL: http://keycloak:8080
    volumes:
      - ../../apps/api:/app
    ports:
      - "8000:8000"   # API: http://localhost:8000
                      # Docs: http://localhost:8000/docs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Celery worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
      target: development
    container_name: copiloto-worker
    restart: unless-stopped
    command: uv run celery -A src.workers.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-copiloto}:${POSTGRES_PASSWORD:-changeme_dev}@postgres:5432/${POSTGRES_DB:-copiloto}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ../../apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Next.js frontend (dev con hot-reload)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: development
    container_name: copiloto-web
    restart: unless-stopped
    command: pnpm dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
      NEXT_PUBLIC_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-copiloto}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: copiloto-web
    volumes:
      - ../../apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"   # Web: http://localhost:3000
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # Mailhog (servidor SMTP de prueba para desarrollo)
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: copiloto-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI: http://localhost:8025

  # ---------------------------------------------------------------------------
  # Prometheus (métricas)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: copiloto-prometheus
    restart: unless-stopped
    volumes:
      - ../../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # ---------------------------------------------------------------------------
  # Grafana (dashboards)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: copiloto-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme_dev}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"   # Grafana: http://localhost:3001

volumes:
  postgres_data:
  redis_data:
  minio_data:
  keycloak_data:
  prometheus_data:
  grafana_data:
  web_node_modules:
